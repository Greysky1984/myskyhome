<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网站第二页</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }
        .container {
            padding: 2rem;
            max-width: 800px;
            margin: 0 auto;
            background-color: #fff;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            text-align: center;
        }
        .container h1 {
            margin-top: 0;
        }
        .back-button {
            display: inline-block;
            margin-top: 2rem;
            padding: 0.5rem 1rem;
            background-color: #333;
            color: #fff;
            text-decoration: none;
            border-radius: 5px;
        }
        .back-button:hover {
            background-color: #555;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>网站第二页</h1>
        <p>这是网站的第二页。你可以在这里添加更多的内容，比如文章、图片、视频等。</p>
        <p>这个页面是一个简单的示例，展示了如何创建一个基本的网页结构。</p>
        <a href="#" class="back-button" onclick="window.history.back();">返回首页</a>
        <!-- 注意：这里的href="#"是为了防止链接到一个实际的URL，onclick事件将处理返回上一页的逻辑 -->
        <!-- 如果你希望链接到你的首页URL（比如https://yourwebsite.com/），你应该将href属性设置为那个URL -->
        <!-- 例如：<a href="https://yourwebsite.com/" class="back-button">返回首页</a> -->
    </div>
</body>
</html>
